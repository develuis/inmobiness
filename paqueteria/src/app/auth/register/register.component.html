<div class="flex items-center justify-center min-h-screen bg-gray-100">
  <form
    class="w-full max-w-md bg-white p-8 rounded-lg shadow-lg"
    [formGroup]="registerForm"
    (ngSubmit)="onSubmit()"
  >
    <h2 class="text-2xl font-bold text-gray-700 mb-6 text-center">
      Registro
    </h2>

    <!-- Nombre completo -->
    <div class="mb-4">
      <label
        for="fullName"
        class="block text-gray-600 font-medium mb-2"
      >
        Nombre completo
      </label>
      <input
        id="fullName"
        type="text"
        formControlName="fullName"
        class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="Tu nombre completo"
      />
      <small *ngIf="registerForm.get('fullName')?.invalid && registerForm.get('fullName')?.touched" class="text-red-500">
        El nombre completo es requerido.
      </small>
    </div>

    <!-- Celular -->
    <div class="mb-4">
      <label
        for="phone"
        class="block text-gray-600 font-medium mb-2"
      >
        Celular
      </label>
      <input
        id="phone"
        type="tel"
        formControlName="phone"
        class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="Tu número de celular"
      />
      <small *ngIf="registerForm.get('phone')?.invalid && registerForm.get('phone')?.touched" class="text-red-500">
        Ingresa un número de celular válido.
      </small>
    </div>

    <!-- Correo electrónico -->
    <div class="mb-4">
      <label
        for="email"
        class="block text-gray-600 font-medium mb-2"
      >
        Correo electrónico
      </label>
      <input
        id="email"
        type="email"
        formControlName="email"
        class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="tu@email.com"
      />
      <small *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" class="text-red-500">
        Ingresa un correo válido.
      </small>
    </div>

    <!-- Contraseña -->
    <div class="mb-4">
      <label
        for="password"
        class="block text-gray-600 font-medium mb-2"
      >
        Contraseña
      </label>
      <input
        id="password"
        type="password"
        formControlName="password"
        class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="Tu contraseña (mín. 8 caracteres)"
      />
      <small *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched" class="text-red-500">
        La contraseña debe tener al menos 8 caracteres.
      </small>
    </div>

    <!-- Confirmar Contraseña -->
    <div class="mb-6">
      <label
        for="confirmPassword"
        class="block text-gray-600 font-medium mb-2"
      >
        Confirmar Contraseña
      </label>
      <input
        id="confirmPassword"
        type="password"
        formControlName="confirmPassword"
        class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="Confirma tu contraseña"
      />
      <small *ngIf="registerForm.get('confirmPassword')?.invalid && registerForm.get('confirmPassword')?.touched" class="text-red-500">
        Las contraseñas deben coincidir.
      </small>
    </div>

    <button
      type="submit"
      class="w-full bg-yellow-200 text-neutral-700 p-3 rounded-lg hover:bg-blue-600 transition duration-300"
      [disabled]="registerForm.invalid"
    >
      Registrarse
    </button>
  </form>
</div>
