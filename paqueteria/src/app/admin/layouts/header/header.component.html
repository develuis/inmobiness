<header class="flex justify-between items-center px-6 py-4 " >
    <div class="border-gray-200">
        <div class="w-64 flex p-2 h-10 items-center gap-2 text-gray-400 ">

        </div>
    </div>
    <div class="flex items-center gap-4">

            <img

            [src]="userImg"
            (error)="onImgError($event)"
            style="width: 25px;height:25px;border-radius:50%">
        <h3 class="text-md text-gray-400">{{userName}}</h3>
        <button class="text-gray-800  px-4 py-2 rounded hover:bg-pink-600"  (click)="logout()">
            <i class="pi pi-sign-out" ></i>
        </button>
    </div>
</header>
