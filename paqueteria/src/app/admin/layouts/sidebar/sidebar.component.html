<aside class="flex flex-col h-screen w-64 bg-[#0f1f1a] shadow-xl">

  <!-- Logo -->
  <div class="flex items-center justify-center px-6 py-6 border-b border-white/10">
    <h3 class="text-white font-bold tracking-widest uppercase text-lg">Inmobiness</h3>
  </div>

  <!-- Nav -->
  <nav class="flex-1 px-3 py-4 overflow-y-auto">
    <ul>
      @for (item of currents; track $index) {
        <li class="my-1">
          <a [routerLink]="[item.path]" routerLinkActive="text-pink-700 font-semibold"
              class="flex items-center gap-3 px-4 py-3 rounded-lg transition-all duration-200 text-gray-400 hover:bg-white/5 hover:text-white border-l-4 border-transparent"
              [ngClass]="{'bg-[#a68b6d]/10 text-[#a68b6d] border-l-4 border-[#a68b6d]': currentRoute == item.path}"
              (click)="currentRoute=item.path"
          >
            <i [class]="item.icon" style="font-size: 1.2rem"></i>
            <span class="text-sm font-medium tracking-wide">{{item.title}}</span>
          </a>
        </li>
      }
    </ul>
  </nav>

  <!-- Footer -->
  <div class="px-4 py-4 border-t border-white/10">
    <div class="flex items-center gap-3 px-3 py-2 rounded-lg bg-white/5">
      <div class="w-8 h-8 rounded-full bg-[#a68b6d] flex items-center justify-center">
        <i class="pi pi-user text-white" style="font-size: 0.9rem"></i>
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-white text-sm font-medium truncate">Usuario</p>
        <p class="text-gray-400 text-xs truncate">Admin</p>
      </div>
      <i class="pi pi-sign-out text-gray-400 hover:text-red-400 cursor-pointer transition-colors" style="font-size: 1rem"></i>
    </div>
  </div>

</aside>
