<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExpressEnvíos - Soluciones Logísticas Confiables</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --secondary: #f59e0b;
      --dark: #1e293b;
      --light: #f8fafc;
    }

    body {
      font-family: 'Open Sans', sans-serif;
      color: var(--dark);
      line-height: 1.6;
    }

    h1,
    h2,
    h3,
    h4 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
    }

    .hero-overlay {
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.7) 0%, rgba(0, 0, 0, 0.3) 100%);
    }

    .service-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    .testimonial-card {
      position: relative;
    }

    .testimonial-card:before {
      content: '"';
      position: absolute;
      top: -10px;
      left: 10px;
      font-size: 4rem;
      color: var(--primary);
      opacity: 0.2;
      font-family: serif;
    }

    .btn-primary {
      transition: all 0.3s ease;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
    }

  </style>
</head>

<body>


  <!-- Services Section -->
  <section id="services" class="py-20 bg-white min-h-screen">



    <div class="container mx-auto px-6">
     <div class="bg-[#0a1a16] w-full h-56 py-4">
    <div class="grid grid-cols-4  gap-1 w-full">

      <div class="overflow-hidden">
        <img src="https://images.unsplash.com/photo-1512918728675-ed5a9ecdebfd?q=80&w=800&auto=format&fit=crop"
          alt="Propiedad moderna" class="h-3/6 w-full object-cover">
      </div>

      <div class="overflow-hidden ">
        <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=800&auto=format&fit=crop"
          alt="Casa de lujo" class="h-3/6 w-full object-cover">
      </div>

      <div class="overflow-hidden ">
        <img src="https://images.unsplash.com/photo-1519567241046-7f570eee3ce6?q=80&w=800&auto=format&fit=crop"
          alt="Interior comercial" class="h-3/6 w-full object-cover">
      </div>

      <div class="overflow-hidden ">
        <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=800&auto=format&fit=crop"
          alt="Edificio corporativo" class="h-3/6 w-full object-cover">
      </div>
    </div>
  </div>


      <div class="text-center max-w-2xl mx-auto mb-16">
        <span
          class="inline-block px-3 py-1 text-sm font-semibold text-blue-600 bg-blue-100 rounded-full mb-4">Selecciona</span>
        <h2 class="text-4xl font-bold mb-4">Tipo de perfíl

        </h2>
      </div>

      <div class="container mx-auto px-6">
        <!-- Primera fila de servicios -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 h-64 mb-8">
          <!-- Casa -->
          <div
            class="service-card bg-white p-4 rounded-lg shadow-sm border border-slate-100 flex flex-col items-center justify-center cursor-pointer hover:shadow-md transition duration-300">
            <div class="text-[#796859] mb-2 rounded-full border-2 bg-[#202d29] p-3">
              <i class="pi pi-user" style="font-size: 2rem"></i>
            </div>
            <a [routerLink]="['/login']" class="font-medium text-4xl">Propietario</a>
          </div>

          <!-- Departamento -->
          <div
            class="service-card bg-white p-4 rounded-lg shadow-sm border border-slate-100 flex flex-col items-center justify-center cursor-pointer hover:shadow-md transition duration-300">
            <div class="text-[#796859] mb-2 rounded-full border-2 bg-[#202d29] p-3">
              <i class="pi pi-user" style="font-size: 2rem"></i>
            </div>
            <a [routerLink]="['/login']" class="font-medium text-4xl">Asesor inmobiliario</a>
          </div>

          <!-- Local -->
          <div
            class="service-card bg-white p-4 rounded-lg shadow-sm border border-slate-100 flex flex-col items-center justify-center cursor-pointer hover:shadow-md transition duration-300">
            <div class="text-[#796859] mb-2 rounded-full border-2 bg-[#202d29] p-3">
              <i class="pi pi-user" style="font-size: 2rem"></i>
            </div>
            <span class="font-medium text-4xl">Apoyo</span>
          </div>


        </div>


      </div> <!-- Service 1 -->




    </div>
  </section>




  <!-- Scripts -->
  <script src="https://unpkg.com/primeicons/primeicons.js"></script>
</body>

</html>
