@if(!loaded){
    <app-preloader></app-preloader>
}
@else{
    <div class="w-100">
        <!-- TITLE SECTION -->
         <div class="flex justify-between w-100">
            <h1 class="text-2xl font-bold text-gray-700">Clientes</h1>
            <div>
                <p-button icon="pi pi-plus"
                [routerLink]="['/admin/clients/view/0']"

                    outlined="true"
                    label="Agregar Cliente"
                    severity="primary">
                </p-button>

            </div>
         </div>

        <!-- MAIN SECTION -->
         <div class="w-100 py-4">
            <p-table [value]="data" [tableStyle]="{ 'min-width': '50rem' }" dataKey="id"
                #dt2  [rows]="10" [showCurrentPageReport]="true" [rowsPerPageOptions]="[10,25,50]"
                [paginator]="true" currentPageReportTemplate="Mostrando {first} hasta {last} of {totalRecords}"
                [globalFilterFields]="['user.name','user.email','saldo']">
                <ng-template pTemplate="caption">
                    <div class="flex justify-end pt-2">

                        <div class="border-gray-200">
                            <div class="w-64 flex p-2 h-10 items-center gap-2 text-gray-400 ">
                                <i class="pi pi-search"></i>
                                <input type="search" (input)="dt2.filterGlobal($any($event.target).value , 'contains')" placeholder="Buscar" class="p-2 outline-none">
                            </div>
                        </div>
                    </div>
                </ng-template>
                <ng-template pTemplate="header" let-columns>
                    <tr>
                        <th class="text-center">Id</th>
                        <th class="text-center">Nombre</th>
                        <th class="text-center">Email</th>
                        <th class="text-center">Teléfono</th>
                        <th class="text-center">Saldo</th>

                        <th style="width: 200px;"></th>

                    </tr>
                </ng-template>
                <ng-template pTemplate="body" let-rowData let-columns="columns">

                    <tr>
                        <td class="text-center">{{ rowData.id }}</td>
                        <td class="text-center">{{ rowData.user.name }}</td>
                        <td class="text-center">{{ rowData.user.email }}</td>
                        <td class="text-center">{{ rowData.phone }}</td>
                        <td class="text-center">{{ rowData.balance | currency:'USD' }}</td>

                        <td class="text-end">
                            <p-button label="Detalles" icon="pi pi-arrow-right"
                            [outlined]="true"
                            severity="warn"
                            [routerLink]="['/admin/clients/'+rowData.id]"/>
                        </td>
                    </tr>
                </ng-template>
            </p-table>




         </div>
         <!-- END MAIN SECTION -->
    </div>

}
